<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de contacto profesional">
    <title>Contacto | Mi Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contáctame</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="portafolio.html">Portafolio</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Envíame un mensaje directo</h2>
            <!-- AQUÍ VA TU CORREO PARA QUE FUNCIONE -->
            <form action="https://formspree.io" method="POST">

                
                
                <label for="nombre">Nombre Completo *</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>

                <label for="email">Correo Electrónico *</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>

                <label for="tel">Teléfono</label>
                <input type="tel" id="tel" name="tel" placeholder="+52 123 456 7890">

                <label for="asunto">Asunto</label>
                <select id="asunto" name="asunto">
                    <option value="Consulta">Consulta</option>
                    <option value="Proyecto">Propuesta de Proyecto</option>
                    <option value="Trabajo">Oferta de Trabajo</option>
                    <option value="Otro">Otro</option>
                </select>

                <label for="mensaje">Tu mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe aquí tu mensaje..." required></textarea>

                <label>
                    <input type="checkbox" name="terminos" required> 
                    Acepto las políticas de privacidad y contacto.
                </label>

                <button type="submit">Enviar Mensaje al Correo</button>
            </form>
        </section>

        <section>
            <h2>Información de Contacto</h2>
            <table>
                <thead>
                    <tr>
                        <th>Método</th>
                        <th>Detalle</th>
                        <th>Horario</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Email</strong></td>
                        <td>ommsough@ejemplo.com</td>
                        <td>Respuesta en 24h</td>
                    </tr>
                    <tr>
                        <td><strong>Ubicación</strong></td>
                        <td>Ciudad de México, MX</td>
                        <td>Presencial previa cita</td>
                    </tr>
                </tbody>
            </table>
            
            <h3>Mi Ubicación</h3>
            <img src="imagenes/mapa.jpg" alt="Mapa de ubicación ficticia" style="width: 100%; border-radius: 8px;">
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Mi Perfil Profesional </p>
    </footer>
</body>
</html>
